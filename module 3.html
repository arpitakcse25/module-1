<html>
<head>
    <title>CodeMaster Academy</title>
    <style>
       body {
            background-color: pink;
            font-family: Arial;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: black;
        }
        fieldset {
            border-radius: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background-color: white;
        }
        legend {
            font-size: 18px;
            color: black;
        }
        .courses {
            display: flex;
            justify-content: space-around;
            text-align: center;
        }
        .course-box {
            width: 30%;
        }
        progress {
            width: 100%;
            height: 20px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            background-color: white;
        }
        th {
            background-color: hotpink; /* FIXED invalid color */
            color: white;
        }
        th, td {
            padding: 10px;
            text-align: center;
        }
        tr:nth-child(even) {
            background-color: lightpink;
        }
        video {
            display: block;
            margin: auto;
            border-radius: 10px;
        }
        button {
            margin-top: 10px;
            padding: 5px 10px;
            border: none;
            background-color: purple;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>


</head>

<body onload="showWelcome()">

<h1>CodeMaster Academy Dashboard</h1>
<hr>

<fieldset>
    <legend><b>Enrolled Courses</b></legend>
    <div class="courses">
        <div class="course-box">
            <p>HTML Course</p>
            <progress id="htmlBar" value="30" max="100"></progress>
            <p>30%</p>
            <button onclick="updateProgress('htmlBar',10)">Increase</button>
        </div>

        <div class="course-box">
            <p>JavaScript Course</p>
            <progress id="jsBar" value="60" max="100"></progress>
            <p>60%</p>
            <button onclick="updateProgress('jsBar',10)">Increase</button>
        </div>

        <div class="course-box">
            <p>Python Course</p>
            <progress id="pyBar" value="90" max="100"></progress>
            <p>90%</p>
            <button onclick="updateProgress('pyBar',10)">Increase</button>
        </div>
    </div>
</fieldset>

<br>

<fieldset>
    <legend><b>Upcoming Deadlines</b></legend>
    <button onclick="showDeadlines()">Show Reminder</button>
    <table border="1">
        <tr>
            <th>Course</th>
            <th>Task</th>
            <th>Date</th>
        </tr>
        <tr>
            <td>HTML</td>
            <td>Assignment</td>
            <td>April 12</td>
        </tr>
        <tr>
            <td>JavaScript</td>
            <td>Quiz</td>
            <td>April 15</td>
        </tr>
        <tr>
            <td>Python</td>
            <td>Project</td>
            <td>April 20</td>
        </tr>
    </table>
</fieldset>

<br>

<fieldset>
    <legend><b>Video Lecture</b></legend>
    <video id="myVideo" width="400" controls muted loop>
        <source src="video.mp4" type="video/mp4">
    </video>
    <center>
        <button onclick="toggleVideo()">Play / Pause</button>
    </center>
</fieldset>
<link rel="stylesheet" href = "script.js"
</body>
</html>
